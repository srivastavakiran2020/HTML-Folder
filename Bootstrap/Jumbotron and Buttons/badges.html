<!DOCTYPE html>
<html>
    <head>
        <title> Badges</title>
        <meta charset="utf-8">
        
        <meta name="viewport" content="width=device-width, initial-scale=1">
        
        <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
        
        <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js">

        </script>
    </head>
    <body>
        <div class="container">
            <H2>Contextual Badges</H2>
            <span class="badge badge-primary">Primary</span><br>
            <span class="badge badge-warning">Warning</span><br>
            <span class="badge badge-danger">Danger</span><br>
            <span class="badge badge-success">Success</span><br>
            <span class="badge badge-secondary">Secondary</span><br>
            <span class="badge badge-info">Information</span><br>
            <span class="badge badge-light">Light mode</span><br>
            <span class="badge badge-dark">Dark mode</span><br>
            <span class="badge badge-settle">Settle</span>
        </div>
    </body>
</html>
