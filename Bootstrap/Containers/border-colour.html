<!DOCTYPE html>
<html>
    <head>
        <title> Borders and Colours</title>
        <meta charset="utf-8">
        
        <meta name="viewport" content="width=device-width, initial-scale=1">
        
        <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
        
        <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js">

        </script>
    </head>
    <body>
      <div class="container border border-dark p-5 my-5">
        <H1>  What is Codingal doing?</H1>
        <p> The team is making students fall in love with coding activities. </p>
      </div>
      <div class="container p-5 mb-5 bg-primary text-white">
        <H1> What is Codingal doing?</H1>
        <p> The team is making students fall in love with coding activities. </p>
      </div>
      <div class="container p-5 my-4 border border-dark bg-danger">
        <H1> What is Codingal doing?</H1>
        <p> The team is making students fall in love with coding activities. </p>
      </div>
    </body>
</html>
