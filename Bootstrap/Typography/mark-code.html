<!DOCTYPE html>
<html>
    <head>
        <title> Mark and Code</title>
        <meta charset="utf-8">
    
        <meta name="viewport" content="width=device-width, initial-scale=1">
    
        <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
    
        <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js">

        </script>
        </head>
        <body>
            <p>H<sub>2</sub>O</p>
            <p>a<sup>2</sup>+ b<sup>2</sup>= c<sup>2</sup></p>
            <H1>Highlight  the Text</H1>
            <p> Use "Mark" tag to <mark>Highlight</mark> the text.</p>
            <div class="container">
                <H1> Code Snippet</H1>
                <p>In-line snippet of a code should be embedded with a code element : </p>
                <p>The following HTML tags:
                    <code>Span</code>, <code>Section</code> and <code>div</code> define a section in documents
                </p>
            </div>
        </body>
</html>
