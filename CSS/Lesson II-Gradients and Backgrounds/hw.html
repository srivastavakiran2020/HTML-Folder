<head>
    <title> Gradients</title>
    <style>
        #grad2 {
            height: 400px;
            background-color: green;
            background-image: linear-gradient(red,
                    orange, yellow, lawngreen, cyan, blue, blueviolet)
        }
    </style>


</head>

<body>
    <div id="grad2" style="text-align:center; margin:auto; color:rgb(0, 252, 197); font-size:50px; weight:bold;">
        Linear
    </div>
        <style>
            #grad1 {
                height: 400px;
                background-color: green;
                background-image: radial-gradient(red,
                        orange, yellow, lawngreen, cyan, blue, blueviolet)
            }
        </style>
        
        
        </head>
        
        <body>
            <div id="grad1" style="text-align:center; margin:auto; color:rgb(0, 0, 0); font-size:50px; weight:bold;">
                Radial
            </div>
            <title> Animations</title>
            <style>
                /* Animation Code */
                @keyframes example {
                    0% {
                        background-color: red;
                    }
            
                    10% {
                        background-color: orange;
                    }
            
                    20% {
                        background-color: yellow;
                    }
            
                    30% {
                        background-color: lawngreen;
                    }
            
                    40% {
                        background-color: cyan;
                    }
            
                    50% {
                        background-color: blue;
                    }
            
                    60% {
                        background-color: blueviolet;
                    }
            
                    70% {
                        background-color: rgb(211, 43, 226);
                    }
            
                    80% {
                        background-color: rgb(247, 0, 255);
                    }
            
                    90% {
                        background-color: rgb(255, 0, 106);
                    }
            
                    100% {
                        background-color: rgb(255, 0, 119);
                    }
            
            
            
            
                }
            
                /* Applying Amination to the element*/
                div {
                    animation-name: example;
                    animation-duration: 1s;
                    width: 300px;
                    height: 300px;
                    background-color: rgb(255, 255, 255);
                }
            </style>
            </head>
            
            <body>
                <div>
                    Welcome/Wilkommen
                </div>
</body>
</html>
