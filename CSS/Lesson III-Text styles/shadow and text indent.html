<!DOCTYPE html>
<html>
    <head>
        <title> Transform</title>
        <style>
            *{
                text-align:center;
                font-family:monospace
            }
            #text{
                text-shadow: 5px 5px 10px black;
            }
            #box{
                box-shadow: 9px 9px 9px blue
            }
            #indent {
                text-indent:50%
            }
        </style>
    </head>
    <body>
        <H1 id="text"> We can use text shadow to give the shadow to the text.</H1>
        <H1 id="box"> We can use the box shadow to give the shadow to the box</H1>
        <div>
            <P>This is an example of indent text.</P>
            <P id="indent"> This is another example of indent text</P>
        </div>
    </body>
</html>
