<!DOCTYPE html>
<html>

<head>
    <title> Transform</title>
    <style>
        * {
            text-align: center;
            font-family: monospace
        }

        #text {
            text-shadow: 5px 5px 10px black;
        }

        #box {
            box-shadow: 9px 9px 9px blue
        }

        #indent {
            text-indent: 50%
        }
    </style>
</head>

<body>
    <H1 id="text"> You ready?</H1>
    <H1 id="box"> Lets Start.</H1>
    <div>
        <P>My name is Shubh.</P>
        <P id="indent"> This one is indent</P>
    </div>
</body>
    <head>
        <title> Transform </title>
        <style>
            div {
                width: 300px;
                height: 100px;
                background-color: aquamarine;
                border: 2px solid darkred
            }
    
            #mydiv {
                transform: rotateX(180deg);
    
                background-color: cornflowerblue
            }
        </style>
    </head>
    
    <body>
        <H1> Welcome to Windows 12</H1>
        <p>Ready to use Computer?</p>
        <div>
            Hello Doors
        </div>
        <div id="mydiv">
            Hello Windows
        </div>
    </body>
    <head>
        <title> Decoration and Titles</title>
        <style>
            H1 {
                text-decoration: overline;
                text-transform: capitalize;
            }
    
            h2 {
                text-decoration: line-through;
                text-transform: uppercase;
            }
    
            H3 {
                text-decoration: underline;
                text-transform: lowercase;
            }
    
            h4 {
                text-decoration: underline overline line-through;
                text-transform: none
            }
        </style>
    </head>
    
    <body>
        <H1> Windows 12</H1>
        <H2> Windwos 7</H2>
        <H3> Windows 11</H3>
        <H4> Windows 3</H4>
    </body>
    <head>
        <title> Typography </title>
        <style>
            .text1 {
                color: blueviolet;
                font-size: 32px;
            }
    
            .text2 {
                color: rgb(54, 255, 47);
                font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
            }
        </style>
    </head>
    
    <body>
        <H1> Typography </H1>
        <p class="text1"> Welcome to Gala Glori</p>
        <p class="text2"> Welcome to Gala Aria</p>
    </body>
    
    </html>
