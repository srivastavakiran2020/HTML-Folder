<!DOCTYPE html>
<html>
    <head>
        <title> Transform </title>
        <style>
            div{
                width:300px;
                height:100px;
                background-color:aquamarine;
                border:2px solid darkred
            }
        #mydiv{
            transform:rotateX(180deg);
            
            background-color: cornflowerblue
        }
        </style>
    </head>
    <body>
        <H1> Welcome to Windows 11</H1>
        <p>Ready to use Computer?</p>
        <div>
Hello Door
        </div>
        <div id="mydiv">
         Hello Door
        </div>
    </body>
</html>
