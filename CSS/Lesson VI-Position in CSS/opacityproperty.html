<!DOCTYPE html>
<html>
    <head>
        <title> Opacity Property</title>
        <style>
        div{
            background-color:aqua;
            padding:10px;
        }  
        div.first{
            opacity:0.1;
        }
        div.second{
            opacity:0.35;
        }
        div.third{
            opacity:0.50;
        }
        div.fourth{
            opacity:0.75;
        }
        div.fifth{
            opacity:1;
        }
        </style>
    </head>
    <body>
        <H1>Opacity Property</H1>
        <p> How this property looks like.</p>
        <div class="first">
            <p> 1% opaque</p>
        </div>
        <div class="second">
            <P>25% opaque</P>
                
            
        </div>
        <div class="third">
            <p>50% opaque (translucent)</p>
        </div>
        <div class="fourth">
            <p> 75% opaque </p>
        </div>
        <div class="fifth">
           <p>100% opaque (default)</p>
        </div>
    </body>
</html>
