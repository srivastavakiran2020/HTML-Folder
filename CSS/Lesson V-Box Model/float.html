<!DOCTYPE html>
<html>
    <head>
        <style>
            img#flower1{
                float:right
            }
            img#flower2{
                float:left
            }
        </style>
    </head>
    <body>
    <h2> Float Right</h2>
    <p>
        In this  example, the image will float to the right in the paragraph and the text in the paragraph will wrap around the image.
    </p>
    <p> 
     <img id="flower1" src="2-moonflower-claudia-wallace.png" alt="flower1" style="height:100px; width:100px">
    <img id="flower2" src="2-moonflower-claudia-wallace.png" alt="flower2" style="height:100px; width:100px">
    This is a demi-content used to understand float property to change orientaion.
    </p>
    </body>
</html>
