<!DOCTYPE html>
<html lang="eng">
    <head>
        <title> Box Model </title>
        <style type="text/css">
            .example1{
                background-color:aquamarine;
                /* top right bottom left*/
                padding: 0px 10px 20px 40px;
                border:0px;
                margin:0px;
                float:left;
            }
            .example2{
                width:200px;
                height:100px;
                background-color:blueviolet;
                border: 5px solid rgb(0, 255, 42);
                padding: 20px;
                margin:60px 60px;
            }
            
        </style>
    </head>
    <body>
        <p class="example1"> An example of a paragraph</p>
        <hr style="width:10%;height:10px;color:blue;">
        <p class="example2"> An second example of a paragraph</p>
        <hr style="width:20%;height:1px;color:blue;">
    </body>
</html>
