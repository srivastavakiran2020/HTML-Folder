<!DOCTYPE html>
<html>
    <head>
        <title>My Gaming Profile</title>
        <style>
            body{
                font-family: Arial, Helvetica, sans-serif;
                background: rgb(0, 136, 255);
                text-align: center;
                padding: 30px;
            }
            H1 { color: navy}
            button{
                background: aquamarine;
                color: black;
                padding: 10px 25px;
                border: blue;
                border-radius: 20px;
                cursor: pointer;
            }
            div {
                border : 1px solid darkgreen;
                width: 280px;
                margin: 6px auto;
                padding: 8px 12px;
                text-align: left;
                border-radius: 6px;
            }
        </style>
    </head>
    <body>

        <H1>My Gaming Profile</H1>
        <button onclick="showProfile()">Details</button>

        <div>Username: <span id="name"></span></div>
        <div>No. of points: <span id="score"></span></div>
        <div>Top Rank: <span id="record"></span></div>
        <div>Podium level: <span id="rank"></span></div>
        <div>Greeting: <span id="greeting"></span></div>
        <div>Stars: <span id="stars"></span></div>
        <div>Bonus Levels: <span id="bonus"></span></div>
        <div>Name of the Team: <span id="team"></span></div>
        <script>
            
            function showProfile() {


                // Variables
                let name = "Shubh";
                let myScore = 100;
                let highScore = 100;
                let bonus = null;
                let team;



                // Comparison Operator
                let isTopScore = myScore == highScore;




                // if / else - Rank
                let rank;
                if (myScore >= 80) {
                    rank = "Gold Level";
                } else if (myScore >= 50) {
                    rank = "Silver Level"
                } else {
                    rank = "Bronze Level"
                }
                // Data Object - Greeting
                let hour = new Date().getHours();
                let greeting;
                if(hour > 12) {
                    greeting = "Good Morning!";
                } else if (hour > 15) {
                    greeting = "Good Afternoon!";
                } else {
                    greeting = "Good Evening!";
                }




                //White Loop - Stars
                let stars = "";
                let count = 0;
                while (count < 5) {
                    stars = stars + "* ";
                    count = count + 1;
                }


                //String Concentration - Show on Page Result
                document.getElementById("name").innerHTML   = name;
                document.getElementById("score").innerHTML   = myScore + " out of " + highScore;
                document.getElementById("record").innerHTML   =  isTopScore;
                document.getElementById("rank").innerHTML   = rank;
                document.getElementById("greeting").innerHTML   = greeting;
                document.getElementById("stars").innerHTML   = stars;
                document.getElementById("bonus").innerHTML   = bonus;
                document.getElementById("team").innerHTML   = team;
            }
        </script>
    </body>
</html>
