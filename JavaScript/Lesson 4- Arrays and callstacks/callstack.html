<!DOCTYPE html>
<html>
    <head>
        <title>Call Stacks in JS</title>
    </head>
    <body>
        <H2>Call Stacks in JS</H2>
        <P>Do a calculation and the result will be displayed with call stacks.</P>
        <P id="demo"></P>
        <script>
            function add(a, b) {
                return a + b;
            }
            function average(a, b) {
                return add(a, b) / 2;
            }
            let result = average(10, 20);
            document.getElementById("demo").innerHTML = result;
        </script>
    </body>
</html>
