<!DOCTYPE html>
<html>
    <head>
        <title>Loops in JavaScript</title>
    </head>
    <body>
        <H1>Loops in JavaScript</H1>
        <p id="demo"> </p>
        <script>
            var fruits=["Banana","Orange","Apple", "Mango", "Grapes", "Lime"];
            var text="";
            var i;
            for(i=0; i<fruits.length; i++)
        {
            text += fruits [i] + "<br>";
        }
        document.getElementById("demo").
        innerHTML = text;
        </script>
    </body>
</html>
