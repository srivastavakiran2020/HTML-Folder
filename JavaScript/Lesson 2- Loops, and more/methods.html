<!DOCTYPE html>
<html>
    <head>
        <title>Methods in JavaScript</title>
    </head>
    <body>
        <h2>JavaScript String Methods</h2>
        <P>Basic Methods</P>
        <script>
            var st="Codingal";
            document.write(st.toLowerCase())
            document.write("<br>")
            document.write(st.toUpperCase())
            document.write("<br>")
            document.write(st.startsWith("C"))
            document.write("<br>")
            document.write(st.startsWith("i"))
            document.write("<br>")

            //Test Method//
            var str1="Get coded up for upcoming classes";
            var patt=new RegExp("coding");
            var res=patt.test(str1);
            document.write(res)
        </script>
    </body>
</html>
