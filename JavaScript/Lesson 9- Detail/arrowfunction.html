<!DOCTYPE html>
<html>
    <head>
        <title>JS Arrow function</title>
    </head>
    <body>
        <H1>JS Arrow Function</H1>
        <p>This method shows Arrow Function with a parameter.</p>

        <p id="result"></p>

        <script>
            const add = (a,b) => a + b;

            document.getElementById("result").innerHTML = add(4,6);
        </script>
    </body>
</html>
