<!DOCTYPE html>
<html>
    <head>
        <title>
            Error handling in JS
        </title>
    </head>
    <body>
        <H2>JS error handling</H2>

        <p>This method shows how we use <code>try</code> and <code>catch</code> tag.</p>

        <p id="error"></p>
        <script>
            try {
                addalert ("Welcome Guest!");
            }

            catch(err) {
                document.getElementById("error").innerHTML = err.message;
            }
        </script>
    </body>
</html>
