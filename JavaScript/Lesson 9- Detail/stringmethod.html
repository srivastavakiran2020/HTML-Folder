<!DOCTYPE html>
<html>
    <head>
        <title>
            Methods of "'String()'"
        </title>
    </head>
    <body>
        <H1>String() method of JS</H1>
        <P>String() also has the ability to convert a number to a string.</P>
        <p id="number-result"></p>
        <p id="string-result"></p>

        <script>
            var x = 70;
            var y = 90;

            document.getElementById("number-result").innerHTML = x + y;

            document.getElementById("string-result").innerHTML = String(x) + String(y);
            // Doesn't add because of the string and string concatenates...
        </script>
    </body>
</html>
