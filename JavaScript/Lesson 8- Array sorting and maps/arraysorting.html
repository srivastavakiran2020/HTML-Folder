<!DOCTYPE html>
<html>
    <head>
        <title>Array-Sorting of Numbers</title>
    </head>
    <body>
        <H1>JS Array Sorting of Numbers</H1>
        <p>Click on the button to arrange numbers in ascending/descending order.</p>

        <button onclick="ascending()">Ascending Order</button>
        <button onclick="descending()">Descending Order</button>

        <p id="result"></p>

        <script>
            var points = [40, 100, 1, 5, 25, 10];

            document.getElementById("result").innerHTML = points;

            function ascending() {
                points.sort (function (a, b) {
                    return a - b;
                } );
                document.getElementById("result").innerHTML = points;
            }

            function descending() {
                points.sort (function (a, b) {
                    return b - a;
                } );
                document.getElementById("result").innerHTML = points;
                }
        </script>
    </body>
</html>
