<!DOCTYPE html><html>
    <head>
        <title>Evaluating Variables in js</title>
    </head>
    <body>
        <H3>Click the button to evaluate/execute JS codes/expressions.</H3>
        <button onclick="myFunction()">Click Me!</button>
        <p id="result"></p>
        <script>
            function myFunction() {
                var x = 10;
                var y = 20;

                var a = eval("x + y") + "<br>";
                var b = eval("2 * 2") + "<br>";
                var c = eval("y - x") + "<br>";

                var res = a + b + c; //concatenates the following string

                document.getElementById("result").innerHTML = res;
            }
        </script>
    </body>
</html>
