<!DOCTYPE html>
<html>
    <head>
        <title>Sum of Arguments in JS</title>
    </head>
    <body>
        <H1>Sum of Arguments</H1>
        <p>You can make arguments with maths as well.</p>
        <p id="result"></p>
        <script>
            var value = Math.abs(35);
                document.write("Demo ABS Test value : " + value + "<br>");

                var value = Math.acos(-1);
                document.write("Demo COS Test value : " + value + "<br>");

                var value = Math.asin(1);
                document.write("Demo SIN Test value : " + value + "<br>");

                var value = Math.atan(90);
                document.write("Demo TAN Test value : " + value + "<br>");
        </script>
    </body>
</html>
