<!DOCTYPE html>
<html>

<head>
    <title>My Superhero Power Cards</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #a7bcf7;
            text-align: center;
            padding: 30px;
        }

        h1 {
            color: #be4dff;
        }

        p {
            color: #b61d43;
        }

        button {
            background-color: #6e4dff;
            color: rgb(82, 238, 165);
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        .card-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 25px;
            flex-wrap: wrap;
        }

        .hero-card {
            background-color: rgb(152, 240, 152);
            border: 3px solid #4d5fff;
            border-radius: 12px;
            width: 220px;
            padding: 18px;
        }

        .hero-name {
            font-size: 22px;
            font-weight: bold;
            color: #222222;
        }

        .hero-power {
            color: #00a3b8;
            font-weight: bold;
        }

        .hero-mission {
            color: #666666;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <h1>My Avengers Superhero Power Cards</h1>

    <p>
        Click the button to create superhero objects using JavaScript classes.
    </p>

    <button onclick="showHeroes()">Show Superheroes</button>

    <div class="card-container" id="heroCards"></div>

    <script>
        // What is a Class?
        // A class is a blueprint used to create objects.

        class Superhero {

            // Constructor
            constructor(name, power, mission) {

                // The this keyword stores values inside the object
                this.name = name;
                this.power = power;
                this.mission = mission;
            }

            // Class Method
            describeHero() {
                return "<div class='hero-card'>" +
                    "<p class='hero-name'>" + this.name + "</p>" +
                    "<p class='hero-power'>Power: " + this.power + "</p>" +
                    "<p class='hero-mission'>Mission: " + this.mission + "</p>" +
                    "</div>";
            }
        }

        function showHeroes() {

            // Creating Objects
            let hero1 = new Superhero(
                "Spiderman",
                "Web Shoots",
                "Shoots spiderweb to swing."
            );

            let hero2 = new Superhero(
                "Captain America",
                "Strong Shield",
                "His shield can withstand everything."
            );

            let hero3 = new Superhero(
                "The Hulk",
                "Rage Strength",
                "Get him mad and he will turn buff-green."
            );

            let hero4 = new Superhero(
                "The Thor",
                "Electric Mjolnir",
                "Saves the world with the Zeus power."
            );

            document.getElementById("heroCards").innerHTML =
                hero1.describeHero() +
                hero2.describeHero() +
                hero3.describeHero() +
                hero4.describeHero();
        }
    </script>

</body>

</html>
