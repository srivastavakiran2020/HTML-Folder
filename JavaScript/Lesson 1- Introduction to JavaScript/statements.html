<!DOCTYPE html>
<html>
    <head>
        <title> JavaScript Statements</title>
    </head>
    <body>
        <H2>JavaScript Statements</H2>
        <p>A <b>JavaScript Program</b> is a list of <b>statements</b> that can be <i>executed</i> by a <code>computer</code>.</p>
        <p id="demo"></p>
        <script>
            var x, y, z;        // Statement 1
            x = 120             // Statement 2
            y = 40              // Statement 3
            z = x + y           // Statement 4
            document.getElementById("demo").innerHTML =
            "The value of 'z' is: " + z;
        </script>
    </body>
</html>
