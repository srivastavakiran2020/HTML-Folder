<!DOCTYPE html>
<html>
    <head>
        <title>JavaScript Variables</title>
    </head>
    <body>
        <H1>JavaScript Variables</H1>
        <p>Sum of two numbers.</p>
        <p id="result"></p>
        <script>
            var num1 = 83453453456149;

            var num2 = 242342342342124;

            var sum = num1 + num2;

            document.getElementById("result"). innerHTML ="The total sum is: " + sum;
        </script>
    </body>
</html>
