<!DOCTYPE html>
<html>
    <head>
        <title>Scope of Variables in Function</title>
    </head>
    <body>
        <p>A function can access variables defined inside the function:-</p>
        <p id="demo"></p>
        <p id="demo1"></p>
        <p id="demo2"></p>
        <button type="button" onclick="myfunction()">
            Hit me LOL XDDD!
        </button>
        <script>
            var b=5;
            function myfunction(){
                var a=4;
                document.getElementById("demo").innerHTML=b*a;
                document.getElementById("demo1").innerHTML=a;
                document.getElementById("demo2").innerHTML=b;

            }

        </script>
    </body>
</html>
