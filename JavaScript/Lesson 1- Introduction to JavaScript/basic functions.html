<!DOCTYPE html>
<html>
    <head>
        <title> Basic Functions of JavaScript</title>
    </head>
    <body>
        <button onclick="myfunction(5)">
            Execute JavaScript Function
        </button>
        <script>
            function myfunction(x,y) {
                if(y==undefined){
                    y=2
                    
                }
                document.write(x * y);
            }
        </script>
    </body>
</html>
